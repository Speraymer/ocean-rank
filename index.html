<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ocean Rank</title><style>
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#020a12;color:#eafaff;font-family:Arial,"Microsoft YaHei",sans-serif}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 75% 15%,#07527a55,transparent 30%),linear-gradient(#06314a18 1px,transparent 1px),linear-gradient(90deg,#06314a18 1px,transparent 1px);background-size:auto,50px 50px,50px 50px}nav{height:76px;max-width:1100px;margin:auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #7fdfff22;position:relative}.brand{letter-spacing:.18em}.brand b{color:#36e6ff}.badge,small{font-size:10px;letter-spacing:.2em;color:#57d8ec}.hero{text-align:center;padding:110px 20px 80px}.hero h1{font-size:clamp(56px,10vw,110px);letter-spacing:-.07em;line-height:.9;margin:25px 0}.hero h1 span{color:transparent;-webkit-text-stroke:1px #45daf0}.hero p{color:#849dad;line-height:1.8}.query,.ranking{max-width:980px;margin:0 auto 90px;padding:30px;border:1px solid #7fdfff22;background:#071724dd}.query{display:grid;grid-template-columns:1fr 1.3fr;gap:35px}.query h2,.ranking h2{font-size:30px;margin:8px 0 12px}.search{display:flex;margin-top:12px}.search input{flex:1;background:#020b12;border:1px solid #6ac7df44;color:white;padding:14px}.search button{border:0;background:linear-gradient(135deg,#0ecbe4,#1961d4);color:white;padding:0 24px;font-weight:bold}.result{grid-column:1/-1;padding:18px;border:1px solid #36e6ff33;display:none}.result strong{font-size:32px;color:#36e6ff;margin-right:18px}.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:30px 0}.card,.row{border:1px solid #7fdfff20;background:#061421;padding:22px;text-align:center}.card strong{display:block;font-size:45px;color:#36e6ff}.card h3{font-size:14px}.row{display:grid;grid-template-columns:55px 1fr auto;text-align:left;align-items:center;margin-top:8px}.row>strong{font-size:20px;color:#5d899d}.row span{color:#829baa;font-size:12px}footer{text-align:center;color:#4c6b7a;padding:30px;font-size:10px;letter-spacing:.15em}@media(max-width:650px){.query{grid-template-columns:1fr;margin:0 15px 70px}.result{grid-column:auto}.podium{grid-template-columns:1fr}.ranking{margin:0 15px 60px}.row{grid-template-columns:40px 1fr}.row span:last-child{display:none}}
</style></head><body><nav><div class="brand">OCEAN <b>RANK</b></div><div class="badge">PUBLIC RESULTS</div></nav><section class="hero"><small>OCEAN OF US · REMIX CONTEST 2026</small><h1>让每一份声音<br><span>浮出海面</span></h1><p>输入参赛编号，查看这场声浪中属于你的位置。</p></section><section class="query"><div><small>FIND YOUR POSITION</small><h2>查询我的排名</h2><p>输入报名时获得的参赛编号</p></div><form class="search" id="search"><input id="id" inputmode="numeric" placeholder="例如：72"><button>查询排名</button></form><div class="result" id="result"></div></section><section class="ranking"><small>THE LEADERBOARD</small><h2>最终排行榜</h2><div class="podium" id="podium"></div><div id="list"></div></section><footer>OCEAN RANK © 2026 · FINAL EDITION</footer><script>
const data=[{id:72,name:'SKEO',rank:1},{id:61,name:'REVIVER',rank:2},{id:31,name:'Miciri-Z',rank:3},{id:53,name:'Hypnotized&Meteor',rank:4},{id:73,name:'Sereinix',rank:5},{id:67,name:'Side',rank:6},{id:63,name:'shiniboros + Aiko Wave',rank:7},{id:21,name:'HeavenStage',rank:8}];
podium.innerHTML=data.slice(0,3).map(x=>`<div class="card"><small>RANK</small><strong>0${x.rank}</strong><h3>${x.name}</h3><span>参赛编号 ${x.id}</span></div>`).join('');list.innerHTML=data.slice(3).map(x=>`<div class="row"><strong>${String(x.rank).padStart(2,'0')}</strong><b>${x.name}</b><span>参赛编号 ${x.id}</span></div>`).join('');search.onsubmit=e=>{e.preventDefault();let x=data.find(v=>v.id==id.value);result.style.display='block';result.innerHTML=x?`<strong>#${x.rank}</strong><b>${x.name}</b> · 参赛编号 ${x.id}`:`未找到编号 <b>${id.value||'—'}</b>`};
</script></body></html>
