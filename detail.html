<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>评分详情｜Ocean Rank</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 75% 15%,#07527a55,transparent 30%),#020a12;color:#eafaff;font-family:Arial,"Microsoft YaHei",sans-serif}.wrap{width:min(760px,calc(100% - 30px));margin:auto;padding:35px 0 60px}.back{color:#6cdaeb;text-decoration:none;font-size:12px}.head{margin:35px 0 18px;padding:35px;border:1px solid #7fdfff22;background:#071724dd}.eyebrow{font-size:9px;letter-spacing:.2em;color:#57d8ec}.head h1{font-size:38px;margin:12px 0 5px}.meta{color:#7994a4;font-size:12px}.rank{display:flex;justify-content:space-between;align-items:end;margin-top:28px}.rank strong{display:block;font-size:64px;color:#36e6ff;line-height:.9}.total{text-align:right}.total b{display:block;font-size:32px}.total small,.rank small{color:#7994a4}.scores{display:grid;grid-template-columns:1fr 1fr;gap:12px}.score{border:1px solid #7fdfff22;background:#061421;padding:22px}.score span{font-size:12px;color:#8ba5b3}.score strong{display:block;font-size:32px;margin:10px 0}.score small{color:#58cfe2}.formula{margin-top:18px;border:1px solid #36e6ff22;padding:18px;color:#7895a5;font-size:11px;line-height:1.8}@media(max-width:560px){.head{padding:25px 20px}.head h1{font-size:28px;overflow-wrap:anywhere}.rank strong{font-size:50px}.scores{grid-template-columns:1fr}}</style></head><body><main class="wrap"><a class="back" href="./">← 返回排行榜</a><section class="head"><div class="eyebrow">PERSONAL SCORE REPORT</div><h1 id="personName">评分详情</h1><div class="meta" id="meta"></div><div class="rank"><div><small>最终排名</small><strong id="personRank"></strong></div><div class="total"><small>综合得分</small><b id="total">0.00</b></div></div></section><section class="scores" id="scores"></section><div class="formula">综合得分 = 编曲创意度 × 25% + 结构完整度 × 15% + 作曲音乐性 × 25% + 混母制作质量 × 35%</div></main><script src="data.js"></script><script>const id=Number(new URLSearchParams(location.search).get('id')),x=contestants.find(v=>v.id===id);if(!x){document.querySelector('.head').innerHTML='<h1>未找到该参赛者</h1>'}else{personName.textContent=x.name;meta.textContent=`参赛编号 ${x.id}`;personRank.textContent=`#${x.rank}`;total.textContent=x.total.toFixed(2);scores.innerHTML=[['编曲创意度','creativity','25%'],['结构完整度','structure','15%'],['作曲音乐性','musicality','25%'],['混母制作质量','production','35%']].map(([n,k,w])=>`<article class="score"><span>${n}</span><strong>${x[k].toFixed(2)}</strong><small>权重 ${w}</small></article>`).join('')}</script></body></html>
